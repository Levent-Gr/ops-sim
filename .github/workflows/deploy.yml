# OPS·SIM — GitHub Pages otomatik dağıtım
# main'e push'ta: testleri çalıştır, projeyi derle ve dist/ çıktısını Pages'e yayınla.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions sekmesinden elle tetikleme

# Pages dağıtımı için gereken izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek dağıtım; devam eden çalışmayı iptal etme (yayını yarıda kesmemek için)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm ci yerine npm install: platforma özgü (esbuild/rollup) opsiyonel
        # bağımlılıkların Linux runner'da güvenilir kurulması için (CI'a özgü kurulum hatasını giderir).
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
